<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ココのうんちタイム☔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      /* JS が aspect-ratio を維持しながら CSS サイズをセットする */
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      border-radius: 16px;
      gap: 16px;
    }
    #overlay h1 {
      color: #fff;
      font-size: 26px;
      text-align: center;
      line-height: 1.4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    #overlay p {
      color: #ccc;
      font-size: 14px;
      text-align: center;
      max-width: 300px;
      line-height: 1.7;
      white-space: pre-line;
    }
    #start-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(102,126,234,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #start-btn:active { transform: scale(0.97); }

    /* タッチ操作はcanvas直接で処理するためdiv不要 */

    #hint {
      position: absolute;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas" width="480" height="640"></canvas>
  <!-- インジケーターはcanvasに直接描画 -->

  <div id="overlay">
    <h1 id="overlay-title">☔ ココのうんちタイム</h1>
    <p id="overlay-msg">雨の中、ここはどうしてもうんちがしたい！
傘を左右に動かしてぬれないようにしてあげよう。
うんち4回でクリア！

💦 おしっこ中は傘の下で乾かすチャンス！

← → キー または 画面左右タップで操作</p>
    <button id="start-btn">スタート！</button>
  </div>
  <div id="hint">画面左タップ ← 右タップ →</div>
</div>

<script src="game.js"></script>
</body>
</html>
